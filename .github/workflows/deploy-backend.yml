name: Deploy Backend to Railway

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "Dockerfile.backend"
      - "railway.toml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway redeploy
        run: curl -s -X POST "$RAILWAY_WEBHOOK"
        env:
          RAILWAY_WEBHOOK: ${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}
